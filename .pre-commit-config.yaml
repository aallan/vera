# Pre-commit hooks ‚Äî run `pre-commit install` after cloning.
# See https://pre-commit.com for more information.
#
# Local hooks use `language: system` and assume the venv is active
# (the same environment where `pip install -e ".[dev]"` was run).

repos:
  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: debug-statements

  # Project-specific checks ‚Äî require activated venv
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy vera/
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: .venv/bin/pytest tests/ -q
        language: system
        types: [python]
        pass_filenames: false

      - id: fix-allowlists
        name: fix allowlists
        entry: .venv/bin/python scripts/fix_allowlists.py --fix
        language: system
        pass_filenames: false
        files: '(README\.md$|EXAMPLES\.md$|FAQ\.md$|SKILL\.md$|spec/.*\.md$)'

      - id: conformance-suite
        name: conformance suite
        entry: .venv/bin/python scripts/check_conformance.py
        language: system
        pass_filenames: false
        files: '(tests/conformance/.*|vera/.*\.py$|vera/grammar\.lark$)'

      - id: vera-examples
        name: vera examples
        entry: .venv/bin/python scripts/check_examples.py
        language: system
        pass_filenames: false
        files: '(\.vera$|vera/.*\.py$|vera/grammar\.lark$)'

      - id: examples-readme
        name: examples readme
        entry: .venv/bin/python scripts/check_examples_readme.py
        language: system
        pass_filenames: false
        files: '(examples/README\.md$|examples/.*\.vera$)'

      - id: readme-examples
        name: readme examples
        entry: .venv/bin/python scripts/check_readme_examples.py
        language: system
        pass_filenames: false
        files: '(README\.md$|vera/.*\.py$|vera/grammar\.lark$)'

      - id: examples-doc
        name: examples doc
        entry: .venv/bin/python scripts/check_examples_doc.py
        language: system
        pass_filenames: false
        files: '(EXAMPLES\.md$|vera/.*\.py$|vera/grammar\.lark$)'

      - id: skill-examples
        name: skill examples
        entry: .venv/bin/python scripts/check_skill_examples.py
        language: system
        pass_filenames: false
        files: '(SKILL\.md$|vera/.*\.py$|vera/grammar\.lark$)'

      - id: faq-examples
        name: faq examples
        entry: .venv/bin/python scripts/check_faq_examples.py
        language: system
        pass_filenames: false
        files: '(FAQ\.md$|vera/.*\.py$|vera/grammar\.lark$)'

      - id: html-examples
        name: html examples
        entry: .venv/bin/python scripts/check_html_examples.py
        language: system
        pass_filenames: false
        files: '(docs/index\.html$|vera/.*\.py$|vera/grammar\.lark$)'

      # Layer 1 of #626 ‚Äî fails when any compile of an example or
      # conformance program emits [E602] (body unsupported) or
      # [E604] (param unsupported) outside the explicit allowlist
      # in scripts/check_e602_clean.py.  The warning channel was
      # the project's only signal for silent translator-skip
      # failures; this hook turns it into a gating check so new
      # silent skips can't merge undetected.
      - id: e602-clean
        name: no unexpected E602/E604 skips
        entry: .venv/bin/python scripts/check_e602_clean.py
        language: system
        pass_filenames: false
        files: '(examples/.*\.vera$|tests/conformance/.*\.vera$|vera/.*\.py$|vera/grammar\.lark$|vera/prelude\.py$|scripts/check_e602_clean\.py$)'

      - id: doc-counts
        name: doc counts
        entry: .venv/bin/python scripts/check_doc_counts.py
        language: system
        pass_filenames: false
        files: '(README\.md$|TESTING\.md$|CONTRIBUTING\.md$|CLAUDE\.md$|docs/index\.html$|tests/test_.*\.py$|tests/conformance/manifest\.json$|examples/.*\.vera$|\.pre-commit-config\.yaml$|\.github/workflows/ci\.yml$)'

      - id: walker-coverage
        name: walker coverage
        entry: .venv/bin/python scripts/check_walker_coverage.py
        language: system
        pass_filenames: false
        # Match all Python under `vera/` plus the script itself.
        # The script's auto-discovery globs `vera/**/*.py` for
        # walkers carrying the `WALKER_COVERAGE:` marker, so the
        # hook's trigger must be at least as broad ‚Äî otherwise a
        # new walker file landing outside the previously-listed
        # subpaths (e.g. `vera/transform.py`, `vera/parser/foo.py`)
        # would be auto-discovered by the script but edits to it
        # wouldn't trigger the hook, replicating the registry-
        # drift silent-skip class this PR is meant to close.
        files: '(vera/.*\.py$|scripts/check_walker_coverage\.py$)'

      - id: limitations-sync
        name: limitations sync
        entry: .venv/bin/python scripts/check_limitations_sync.py
        language: system
        pass_filenames: false
        files: '(KNOWN_ISSUES\.md$|vera/README\.md$|spec/0[89]-.*\.md$|spec/1[12]-.*\.md$)'

      - id: license-check
        name: license check
        entry: .venv/bin/python scripts/check_licenses.py
        language: system
        pass_filenames: false
        files: 'pyproject\.toml$'

      - id: site-assets
        name: site assets
        entry: .venv/bin/python scripts/build_site.py
        language: system
        pass_filenames: false
        files: '(SKILL\.md$|AGENTS\.md$|FAQ\.md$|vera/__init__\.py$|vera/errors\.py$|vera/grammar\.lark$|docs/index\.html$|scripts/build_site\.py$)'

      - id: browser-parity
        name: browser parity
        entry: .venv/bin/pytest tests/test_browser.py -q
        language: system
        pass_filenames: false
        files: '(vera/browser/.*|vera/codegen/api\.py$|vera/wasm/markdown\.py$|vera/markdown\.py$)'

      # Pre-push stage: runs once before `git push`, not per-commit.
      # Checks that PRs touching substantive code (vera/, spec/, SKILL.md)
      # also include a new CHANGELOG entry.  Escape hatches: a
      # "Skip-changelog: <reason>" trailer in any commit on the branch,
      # or SKIP_CHANGELOG_LABEL=1 in the environment (used by CI when a
      # skip-changelog PR label has been detected).
      - id: check-changelog-updated
        name: check CHANGELOG updated for substantive changes
        entry: .venv/bin/python scripts/check_changelog_updated.py
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

      # Pre-push stage: catches stale uv.lock locally instead of in CI.
      # CI runs `uv lock --check` in the lint job; if it fails after a
      # push, you pay ~2 minutes of CI time plus an amend+force-push.
      # Version bumps in pyproject.toml are the common trigger ‚Äî the
      # lockfile gains a new `version = "..."` line for the project
      # package and `uv lock --check` fails.  Running the same check
      # pre-push catches it before the push goes out.  Costs well
      # under a second when the lockfile is fresh.  Added after the
      # v0.0.114 bump on #491 tripped CI lint ‚Äî issue #463's review
      # cycle included this as a hygiene bump.
      - id: uv-lock-check
        name: check uv.lock is in sync with pyproject.toml
        entry: uv lock --check
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
